<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차트 패턴 학습 갤러리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --border2: #21262d;
    --text: #f0f6fc;
    --text2: #e6edf3;
    --muted: #7d8590;
    --dim: #484f58;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --purple: #c084fc;
    --orange: #f97316;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 60px 40px 40px;
    max-width: 1100px;
    margin: 0 auto;
    animation: fadeDown 0.6s ease both;
  }

  .header-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .header-title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .header-title span {
    background: linear-gradient(135deg, #f0f6fc 0%, #7d8590 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 500px;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }

  .filter-bar {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--border); color: var(--text2); }
  .filter-btn.active { border-color: var(--border); background: var(--surface2); color: var(--text); }
  .filter-btn.bull.active { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  .filter-btn.bear.active { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

  .grid {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    text-decoration: none;
    display: block;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border-color: var(--border);
  }

  .card-accent { height: 3px; width: 100%; }

  .card-chart {
    background: var(--bg);
    padding: 20px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-chart svg { width: 100%; height: 100px; }
  .card-body { padding: 20px; }
  .card-badges { display: flex; gap: 6px; margin-bottom: 10px; }

  .badge {
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 8px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .badge-bull { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
  .badge-bear { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
  .badge-type { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }

  .card-title { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; margin-bottom: 4px; }
  .card-subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }
  .card-steps { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .card-step { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  .card-step-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid var(--border2);
  }

  .card-link { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; }
  .card:hover .card-link { color: var(--text2); }
  .card-arrow { font-size: 14px; transition: transform 0.2s; }
  .card:hover .card-arrow { transform: translateX(4px); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header, .filter-bar, .grid { padding-left: 20px; padding-right: 20px; }
    header { padding-top: 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">// 차트 패턴 학습 노트</div>
  <h1 class="header-title"><span>Chart Pattern</span><br>Study Gallery</h1>
  <p class="header-desc">주식 차트의 주요 패턴을 상승/하락으로 분류하여 정리한 학습 카드 모음입니다.</p>
  <div class="header-stats">
    <div class="stat">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">전체 패턴</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-bull" style="color: var(--green)">0</span>
      <span class="stat-label">상승 패턴</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-bear" style="color: var(--red)">0</span>
      <span class="stat-label">하락 패턴</span>
    </div>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn all active" onclick="filter('all', this)">전체</button>
  <button class="filter-btn bull" onclick="filter('bull', this)">📈 상승</button>
  <button class="filter-btn bear" onclick="filter('bear', this)">📉 하락</button>
</div>

<div class="grid" id="grid"></div>

<script>
// =====================================================================
//  ✏️  패턴 추가는 여기서만!
//  PATTERNS 배열에 아래 형식으로 객체 하나 추가하면 카드가 자동 생성됩니다.
// =====================================================================
const PATTERNS = [

  {
    title: "쌍바닥 (W패턴)",
    subtitle: "Double Bottom — 저항 돌파 후 재상승",
    type: "bull",        // "bull" 또는 "bear"
    category: "반전형",  // 반전형 / 지속형 / 수렴형 등 자유 입력
    file: "chart_pattern_card.html",
    accentColor: "linear-gradient(90deg, #f97316, #22c55e)",
    steps: [
      { color: "#ef4444", text: "1차 바닥 → 반등 → 2차 바닥 형성" },
      { color: "#f97316", text: "넥라인(저항선) 상향 돌파" },
      { color: "#22c55e", text: "눌림 후 본격 재상승" },
    ],
    svg: `
      <line x1="0" y1="32" x2="280" y2="32" stroke="#1c2333" stroke-width="1"/>
      <line x1="0" y1="65" x2="280" y2="65" stroke="#1c2333" stroke-width="1"/>
      <line x1="30" y1="32" x2="260" y2="32" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
      <polyline points="20,20 55,65 95,32 135,65 175,15 210,38 240,25 265,10"
        fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="20,20 55,65 95,32 135,65 175,15 210,38 240,25 265,10"
        fill="none" stroke="#22c55e" stroke-width="6" opacity="0.1" stroke-linejoin="round"/>
      <circle cx="55" cy="65" r="3.5" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="135" cy="65" r="3.5" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="175" cy="15" r="3.5" fill="#22c55e" stroke="#0d1117" stroke-width="1.5"/>
      <polygon points="265,10 259,19 271,19" fill="#22c55e"/>
    `
  },

  {
    title: "삼각수렴 하향이탈",
    subtitle: "Descending Triangle — 지지선 이탈 후 급락",
    type: "bear",
    category: "지속형",
    file: "descending_triangle_card.html",
    accentColor: "linear-gradient(90deg, #3b82f6, #ef4444)",
    steps: [
      { color: "#ef4444", text: "고점 낮아짐 + 저점 수평 유지" },
      { color: "#60a5fa", text: "삼각형 수렴 → 지지선 이탈" },
      { color: "#ef4444", text: "리테스트 후 본격 급락" },
    ],
    svg: `
      <line x1="0" y1="35" x2="280" y2="35" stroke="#1c2333" stroke-width="1"/>
      <line x1="0" y1="70" x2="280" y2="70" stroke="#1c2333" stroke-width="1"/>
      <line x1="15" y1="70" x2="190" y2="70" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
      <line x1="20" y1="18" x2="185" y2="65" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <polyline points="20,30 45,70 80,48 115,70 148,58 183,70 200,78 230,65 265,88"
        fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="20,30 45,70 80,48 115,70 148,58 183,70 200,78 230,65 265,88"
        fill="none" stroke="#ef4444" stroke-width="6" opacity="0.1" stroke-linejoin="round"/>
      <circle cx="20" cy="30" r="3" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="80" cy="48" r="3" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="148" cy="58" r="3" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="200" cy="78" r="3.5" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
      <polygon points="265,88 259,77 271,77" fill="#ef4444"/>
    `
  },

  {
    title: "라이징웻지 (Rising Wedge)",
    subtitle: "상승 쐐기형 수렴 후 하향 이탈",
    type: "bear",
    category: "반전형",
    file: "rising_wedge_card.html",
    accentColor: "linear-gradient(90deg, #a855f7, #ef4444)",
    steps: [
      { color: "#a855f7", text: "고점·저점 함께 상승하며 수렴" },
      { color: "#c084fc", text: "거래량 감소 → 모멘텀 약화" },
      { color: "#ef4444", text: "지지선 이탈 → 급락 전환" },
    ],
    svg: `
      <line x1="0" y1="35" x2="280" y2="35" stroke="#1c2333" stroke-width="1"/>
      <line x1="0" y1="70" x2="280" y2="70" stroke="#1c2333" stroke-width="1"/>
      <line x1="20" y1="80" x2="175" y2="15" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
      <line x1="20" y1="90" x2="175" y2="42" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
      <polygon points="20,80 175,15 175,42 20,90" fill="#a855f7" opacity="0.04"/>
      <polyline points="20,88 50,62 80,70 115,42 145,52 175,30 188,46 215,65 250,88"
        fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="20,88 50,62 80,70 115,42 145,52 175,30 188,46 215,65 250,88"
        fill="none" stroke="#ef4444" stroke-width="6" opacity="0.1" stroke-linejoin="round"/>
      <circle cx="50" cy="62" r="3" fill="#a855f7" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="115" cy="42" r="3" fill="#a855f7" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="175" cy="30" r="3" fill="#a855f7" stroke="#0d1117" stroke-width="1.5"/>
      <circle cx="188" cy="46" r="3.5" fill="#ef4444" stroke="#0d1117" stroke-width="1.5"/>
      <polygon points="250,88 244,77 256,77" fill="#ef4444"/>
    `
  },

  // =====================================================================
  //  🆕 새 패턴 추가할 때는 여기에 아래 템플릿을 복사해서 붙여넣고 수정!
  // =====================================================================
  //
  // {
  //   title: "패턴 이름",
  //   subtitle: "영문명 — 한 줄 설명",
  //   type: "bull",          // "bull" 또는 "bear"
  //   category: "반전형",    // 반전형 / 지속형 / 수렴형 등
  //   file: "파일명.html",   // 연결할 상세 HTML 파일
  //   accentColor: "linear-gradient(90deg, #색상1, #색상2)",
  //   steps: [
  //     { color: "#색상", text: "1단계 설명" },
  //     { color: "#색상", text: "2단계 설명" },
  //     { color: "#색상", text: "3단계 설명" },
  //   ],
  //   svg: `... viewBox="0 0 280 100" 기준 SVG 내용 ...`
  // },

];

// =====================================================================
//  ⚙️  자동 렌더링 — 수정 불필요
// =====================================================================
let currentFilter = 'all';

function renderCards(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  data.forEach((p, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = p.file;
    card.dataset.type = p.type;
    card.style.animationDelay = `${0.05 + i * 0.07}s`;
    const dirLabel = p.type === 'bull' ? '📈 상승' : '📉 하락';
    const badgeClass = p.type === 'bull' ? 'badge-bull' : 'badge-bear';
    card.innerHTML = `
      <div class="card-accent" style="background: ${p.accentColor}"></div>
      <div class="card-chart">
        <svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg">${p.svg}</svg>
      </div>
      <div class="card-body">
        <div class="card-badges">
          <span class="badge ${badgeClass}">${dirLabel}</span>
          <span class="badge badge-type">${p.category}</span>
        </div>
        <div class="card-title">${p.title}</div>
        <div class="card-subtitle">${p.subtitle}</div>
        <div class="card-steps">
          ${p.steps.map(s => `
            <div class="card-step">
              <div class="card-step-dot" style="background:${s.color}"></div>
              ${s.text}
            </div>`).join('')}
        </div>
        <div class="card-footer">
          <span class="card-link">자세히 보기</span>
          <span class="card-arrow">→</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function updateStats() {
  document.getElementById('stat-total').textContent = PATTERNS.length;
  document.getElementById('stat-bull').textContent = PATTERNS.filter(p => p.type === 'bull').length;
  document.getElementById('stat-bear').textContent = PATTERNS.filter(p => p.type === 'bear').length;
}

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(type === 'all' ? PATTERNS : PATTERNS.filter(p => p.type === type));
}

renderCards(PATTERNS);
updateStats();
</script>
</body>
</html>
