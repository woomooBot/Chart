<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차트 패턴 학습 갤러리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --border2: #21262d;
    --text: #f0f6fc;
    --text2: #e6edf3;
    --muted: #7d8590;
    --dim: #484f58;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --purple: #c084fc;
    --orange: #f97316;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 1;
    padding: 60px 40px 36px;
    max-width: 1100px;
    margin: 0 auto;
    animation: fadeDown 0.6s ease both;
  }

  .header-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .header-title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .header-title span {
    background: linear-gradient(135deg, #f0f6fc 0%, #7d8590 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 500px;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── Category Tabs (최상위) ── */
  .category-tabs {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border2);
    margin-bottom: 0;
    animation: fadeDown 0.6s 0.08s ease both;
  }

  .cat-tab {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 20px;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    letter-spacing: -0.01em;
  }

  .cat-tab::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 2px;
    background: var(--text);
    border-radius: 2px 2px 0 0;
    transform: scaleX(0);
    transition: transform 0.2s ease;
  }

  .cat-tab:hover { color: var(--text2); }

  .cat-tab.active {
    color: var(--text);
  }

  .cat-tab.active::after {
    transform: scaleX(1);
  }

  .cat-tab .tab-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--dim);
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── Filter Bar (하위) ── */
  .filter-bar {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 40px 28px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  .filter-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: -0.02em;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--border); color: var(--text2); }
  .filter-btn.active { border-color: var(--border); background: var(--surface2); color: var(--text); }
  .filter-btn.bull.active { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  .filter-btn.bear.active { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

  /* ── Grid ── */
  .grid {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    text-decoration: none;
    display: block;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border-color: var(--border);
  }

  .card-accent { height: 3px; width: 100%; }

  .card-chart {
    background: var(--bg);
    padding: 20px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-chart svg { width: 100%; height: 100px; }
  .card-body { padding: 20px; }
  .card-badges { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

  .badge {
    font-size: 11px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: -0.02em;
  }

  .badge-bull { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
  .badge-bear { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
  .badge-type { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }

  .card-title { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; margin-bottom: 4px; }
  .card-subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }
  .card-steps { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .card-step { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  .card-step-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid var(--border2);
  }

  .card-link { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; }
  .card:hover .card-link { color: var(--text2); }
  .card-arrow { font-size: 14px; transition: transform 0.2s; }
  .card:hover .card-arrow { transform: translateX(4px); }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
  }

  .empty-state-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state-text { font-size: 14px; line-height: 1.6; }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header, .category-tabs, .filter-bar, .grid { padding-left: 20px; padding-right: 20px; }
    header { padding-top: 40px; }
    .cat-tab { padding: 10px 14px; font-size: 13px; }
  }
</style>
</head>

  <h1 class="header-title"><span>Chart & Candle</span><br>Study Gallery</h1>

  </div>
</header>

</div>

<!-- 하위 필터 -->

</div>

<div class="grid" id="grid"></div>

  //   accentColor: "linear-gradient(90deg, #22c55e, #f97316)",
  //   steps: [
  //     { color: "#ef4444", text: "하락 추세 중 출현" },
  //     { color: "#f97316", text: "몸통 작고 아래꼬리 길게 형성" },
  //     { color: "#22c55e", text: "다음 날 양봉 확인 시 매수 신호" },
  //   ],
  //   svg: `... SVG 내용 ...`
  // },

];

// =====================================================================
//  ⚙️  자동 렌더링 — 수정 불필요
// =====================================================================
let currentCategory = 'chart';
let currentFilter   = 'all';

function getFiltered() {
  return PATTERNS.filter(p =>
    p.category === currentCategory &&
    (currentFilter === 'all' || p.type === currentFilter)
  );
}

function renderCards() {
  const grid = document.getElementById('grid');
  const data = getFiltered();
  grid.innerHTML = '';

  if (data.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">아직 등록된 패턴이 없어요.<br>PATTERNS 배열에 추가해보세요!</div>
      </div>`;
    return;
  }

  data.forEach((p, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = p.file;
    card.dataset.type = p.type;
    card.style.animationDelay = `${0.05 + i * 0.07}s`;
    const dirLabel  = p.type === 'bull' ? '📈 상승' : '📉 하락';
    const badgeClass = p.type === 'bull' ? 'badge-bull' : 'badge-bear';
    card.innerHTML = `
      <div class="card-accent" style="background: ${p.accentColor}"></div>
      <div class="card-chart">
        <svg viewBox="0 0 280 100" xmlns="http://www.w3.org/2000/svg">${p.svg}</svg>
      </div>
      <div class="card-body">
        <div class="card-badges">
          <span class="badge ${badgeClass}">${dirLabel}</span>
          <span class="badge badge-type">${p.tag}</span>
        </div>
        <div class="card-title">${p.title}</div>
        <div class="card-subtitle">${p.subtitle}</div>
        <div class="card-steps">
          ${p.steps.map(s => `
            <div class="card-step">
              <div class="card-step-dot" style="background:${s.color}"></div>
              ${s.text}
            </div>`).join('')}
        </div>
        <div class="card-footer">
          <span class="card-link">자세히 보기</span>
          <span class="card-arrow">→</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function updateStats() {
  const all   = PATTERNS;
  const chart = all.filter(p => p.category === 'chart');
  const candle = all.filter(p => p.category === 'candle');

  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-bull').textContent  = all.filter(p => p.type === 'bull').length;
  document.getElementById('stat-bear').textContent  = all.filter(p => p.type === 'bear').length;
  document.getElementById('count-chart').textContent  = chart.length;
  document.getElementById('count-candle').textContent = candle.length;
}

function selectCategory(cat, btn) {
  currentCategory = cat;
  currentFilter   = 'all';
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn.all').classList.add('active');
  renderCards();
}

function selectFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

updateStats();
renderCards();
</script>
</body>
</html>
